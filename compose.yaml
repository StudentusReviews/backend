services:
  app:
    user: root
    container_name: anonymousstudentreviews.api
    build:
      context: .
      dockerfile: ./Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=https://+:8081;http://+:8080
    env_file:
      - .env
    volumes:
      - ${SSL_CERTIFICATE_FOLDER_ABSOLUTE_PATH}:/https:ro
    depends_on:
      - db

  db:
    image: postgres:17.5-alpine
    container_name: anonymousstudentreviews.database
    environment:
      POSTGRES_DB: database
      POSTGRES_USER: username
      POSTGRES_PASSWORD: password
    ports:
      - "5431:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./dev-init-databases.sql:/docker-entrypoint-initdb.d/dev-init-databases.sql



volumes:
  pgdata:
  